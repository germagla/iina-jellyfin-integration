name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
          run_install: false
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - name: Verify committed production bundle
        run: |
          git diff --exit-code -- dist
          test -z "$(git ls-files --others --exclude-standard -- dist)"
      - run: pnpm package:archive
      - name: Verify install archive
        run: unzip -t .artifacts/jellyfin-for-iina.iinaplgz
